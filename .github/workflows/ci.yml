name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate package and scripts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Validate shell scripts
        run: bash -n bin/fzf-ai bin/fzf-ai-resume bin/fzf-ai-ui

      - name: Validate Python scripts
        run: python -m py_compile bin/fzf-ai-index bin/fzf-ai-preview setup.py

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: twine check dist/*
